name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, simplexml
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php-version }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run quality suite
        run: composer check

  deploy-artifact:
    name: Deployment artifact smoke test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # Match this to your primary targeted production server PHP version
          php-version: "8.2"
          extensions: dom, simplexml
          coverage: none
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build deploy artifact
        run: bash scripts/build-deploy.sh

      - name: Verify deploy artifact
        run: |
          test -f build/deploy/.htaccess
          test -f build/deploy/public/index.php
          test -f build/deploy/views/layouts/app.php
          
          # Ensure local build environment doesn't accidentally pack these up
          test ! -e build/deploy/tests
          test ! -e build/deploy/docs
          
          # Confirms the local build directory stays clean of a 'legacy' folder 
          # so it doesn't collide with or overwrite the server's independent /legacy/ folder.
          test ! -e build/deploy/legacy
