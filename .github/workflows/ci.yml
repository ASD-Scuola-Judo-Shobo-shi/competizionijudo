name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      MIGRATION_TEST_DATABASE_PREFIX: competizionijudo_test_ci
      MIGRATION_TEST_HOST: 127.0.0.1
      MIGRATION_TEST_PORT: 3306
      MIGRATION_TEST_USER: root

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.2"
          - "8.4"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, simplexml, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php-version }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run clean and legacy migration smoke tests
        run: composer test:migrations

      - name: Run quality suite
        run: composer check

  deploy-artifact:
    name: Deployment artifact smoke test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          # Match this to your primary targeted production server PHP version
          php-version: "8.2"
          extensions: dom, simplexml
          coverage: none
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build deploy artifact
        run: bash scripts/build-deploy.sh

      - name: Verify deploy artifact
        run: bash scripts/verify-deploy-artifact.sh build/deploy

      - name: Boot deploy artifact
        run: bash scripts/test-deploy-artifact.sh build/deploy
